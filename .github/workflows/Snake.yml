name: Snake

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Runs before snk so the container (root) owns dist afterwards; the push step chowns everything back.
      - name: Build forks badge data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          total=$(gh api graphql -f query='query { user(login: "26zl") { repositories(first: 100, ownerAffiliations: OWNER, privacy: PUBLIC) { nodes { forkCount } } } }' -q '[.data.user.repositories.nodes[].forkCount] | add')
          printf '{"schemaVersion":1,"label":"Total Forks","message":"%s","namedLogo":"github","logoColor":"white","labelColor":"0d1117","color":"238636"}' "$total" > dist/forks.json

      - uses: Platane/snk@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3
        with:
          github_user_name: 26zl
          outputs: dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Force-pushed orphan branch so daily regenerations never grow history on main.
      - name: Push to output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The snk container writes dist/ as root; reclaim it for the runner user.
          sudo chown -R "$(id -u)":"$(id -g)" dist
          cd dist
          git init -b output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Generate snake"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" output
