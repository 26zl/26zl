name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@v0.7.0
        env:
          # Stats and profile-details cards need a PAT with read:user; the default token gets "Resource not accessible by integration".
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARDS_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: 26zl
          UTC_OFFSET: 2
          AUTO_PUSH: true
